# Root compose — brings up the full local backend infrastructure in one command:
#   RabbitMQ + every service database + a single Adminer.
# The per-service compose files (ms_dictionary/, ms_user/) still work standalone for
# working on one service in isolation. Do not run both at once — the host ports clash.

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: verborum-rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: verborum
      RABBITMQ_DEFAULT_PASS: verborum
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_dictionary:
    image: postgres:14-alpine
    container_name: verborum-db-dictionary
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: coldtea
      POSTGRES_PASSWORD: qwerty
      POSTGRES_DB: vdbdictionary
    volumes:
      - db_dictionary_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldtea -d vdbdictionary"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_user:
    image: postgres:14-alpine
    container_name: verborum-db-user
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: coldtea
      POSTGRES_PASSWORD: qwerty
      POSTGRES_DB: vdbprofile
    volumes:
      - db_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coldtea -d vdbprofile"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Identity server. Runs in dev mode (start-dev): H2 storage, no HTTPS requirement — local only.
  # --import-realm loads keycloak/import/verborum-realm.json ON FIRST START of an empty data volume,
  # so the realm, clients, roles and dev users are reproducible from git instead of hand-clicked.
  # Editing that file after the volume exists changes nothing: run
  #   docker compose down && docker volume rm verborum_ms_keycloak_data
  # to re-import. Changes made in the admin console are NOT written back to the file.
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: verborum-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      # The image has no curl/wget — talk to the socket directly and ask for the realm's
      # OIDC discovery document, which only answers once the realm is imported and live.
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/verborum/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  admin:
    image: adminer
    container_name: verborum-adminer
    restart: always
    depends_on:
      - db_dictionary
      - db_user
    ports:
      - "8080:8080"

volumes:
  rabbitmq_data:
  db_dictionary_data:
  db_user_data:
  keycloak_data:
