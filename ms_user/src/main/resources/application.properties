server.port=8086
#server.servlet.context-path=/myapp
server.servlet.session.timeout=15m
management.endpoints.web.exposure.include=*
#management.endpoints.web.exposure.exclude=health
management.info.env.enabled=true

#info
info.app.name=Verborum User Micro Service
info.app.version=1.0.0

#PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/vdbprofile
spring.datasource.username=coldtea
spring.datasource.password=qwerty
spring.datasource.driver-class-name=org.postgresql.Driver

#Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.json

#Config variables
supported.languages=EN,DE,FR,ES,IT,PT,NL,TR,AZ,LT,PL,UK,AR,FA,JA,ZH,KO,EL,RU

#Security - Keycloak resource server (JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/verborum
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/verborum/protocol/openid-connect/certs

#Security - Keycloak Admin Client (user registration, ms_user only)
keycloak.realm=verborum
keycloak.auth-server-url=http://localhost:8180
keycloak.admin.client-id=verborum-backend
# keycloak.admin.client-secret is intentionally NOT set here - provide it via
# an environment variable (KEYCLOAK_ADMIN_CLIENT_SECRET) or a local, gitignored
# application-local.properties. Never commit real secrets.
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
