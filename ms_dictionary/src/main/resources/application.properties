server.port=8085
#server.servlet.context-path=/myapp
server.servlet.session.timeout=15m
management.endpoints.web.exposure.include=*
#management.endpoints.web.exposure.exclude=health
management.info.env.enabled=true

#info
info.app.name=Verborum Dictionary Micro Service
info.app.version=1.0.0

#PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/vdbdictionary
spring.datasource.username=coldtea
spring.datasource.password=qwerty
spring.datasource.driver-class-name=org.postgresql.Driver

#Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.json

#RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=verborum
spring.rabbitmq.password=verborum

#RabbitMQ - listener retry before a message is dead-lettered
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0

#Config variables
supported.languages=EN,DE,FR,ES,IT,PT,NL,TR,AZ,LT,PL,UK,AR,FA,JA,ZH,KO,EL,RU